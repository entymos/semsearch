  <rect x="86" y="445" width="700" height="126" rx="18" fill="#020617" stroke="#1e4052" stroke-width="2"/>
  <circle cx="114" cy="473" r="6" fill="#f87171"/><circle cx="138" cy="473" r="6" fill="#fbbf24"/><circle cx="162" cy="473" r="6" fill="#34d399"/>
